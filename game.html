<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Zone - Tiny Animal Farm</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="game.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="header_section game-header">
        <nav class="navbar">
            <!-- ND Logo -->
            <div class="nav-logo">
                <a href="index.html">ND</a>
            </div>

            <!-- Nav Links -->
            <ul class="Menu" id="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="experience.html">Experience</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="publications.html">Publications</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="game.html" class="active">Fun Zone</a></li>
            </ul>

            <!-- Optional burger -->
            <button class="bars" id="menu-toggle" aria-label="Toggle navigation" aria-expanded="false"
                style="background:none; border:none; cursor: pointer;">
                <i class="bx bx-menu" style="color:#fff; font-size: 2rem;"></i>
            </button>
        </nav>
    </div>

    <div class="game-container">
        <h1 class="game-title">Tiny Animal Farm</h1>
        <p class="game-subtitle">Click anywhere in the pasture to adopt a new friend!<br>Watch them wander around and
            enjoy their life.</p>

        <div id="farm-area">
            <div id="instruction-overlay">Click to add animals! 🐾</div>
        </div>

        <div class="controls">
            <button id="clear-btn">Clear Farm</button>
        </div>
    </div>

    <script src="game.js?v=2"></script>
    <script>
        /* Mobile Menu Toggle Logic */
        const menuToggle = document.getElementById('menu-toggle');
        const navMenu = document.getElementById('nav-menu');

        function toggleMenu() {
            const isOpen = navMenu.classList.toggle('active');
            menuToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        }

        menuToggle.addEventListener('click', toggleMenu);

        menuToggle.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                toggleMenu();
            }
        });
    </script>
</body>

</html>
