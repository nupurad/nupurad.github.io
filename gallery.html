<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="stylesheet" href="gallery.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
          <div class="nav-logo">
            <a href="index.html">ND</a>
          </div>
          <ul id="nav-menu">
            <li><a href="experience.html">Experience</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="publications.html">Publications</a></li>
            <li><a href="index.html#contact">Contact</a></li>
            <li><a href="gallery.html">Gallery</a></li>
          </ul>
          <button class="bars" id="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">
            <i class="bx bx-menu" aria-hidden="true"></i>
          </button>
        </nav>
      </header>
    <div class="text">
        <h2>Capturing the World!</h2>
    </div>

    <div class="gallery">
        <div>
            <img src="gallery_imgs/img1.webp">
        </div>

        <div class="v-stretch">
            <img src="gallery_imgs/img2.webp">
        </div>

        <div class="h-stretch">
            <img src="gallery_imgs/img4.webp">
        </div>

        <div class="big-stretch">
            <img src="gallery_imgs/img5.webp">
        </div>

        <div class="h-stretch">
            <img src="gallery_imgs/img6.webp">
        </div>
        <div>
            <img src="gallery_imgs/img7.webp">
        </div>

        <div>
            <img src="gallery_imgs/img8.webp">
        </div>

        <div class="big-stretch">

        </div>

        <div>

        <div>

        </div>
    </div>

    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <script>
      const menuToggle = document.getElementById('menu-toggle');
      const navMenu = document.getElementById('nav-menu');

      function toggleMenu() {
        const isOpen = navMenu.classList.toggle('active');
        menuToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      }

      menuToggle.addEventListener('click', toggleMenu);

      // allow keyboard activation (space/enter) for accessibility
      menuToggle.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          toggleMenu();
        }
      });

      // close menu when a link is clicked (mobile)
      document.querySelectorAll('#nav-menu a').forEach(link => {
        link.addEventListener('click', () => {
          if (navMenu.classList.contains('active')) {
            navMenu.classList.remove('active');
            menuToggle.setAttribute('aria-expanded', 'false');
          }
        });
      });
    </script>
</body>
</html>
